name: E2E

on:
  pull_request:
  workflow_dispatch:

# Non-blocking on PRs: failures do not fail the workflow check.
jobs:
  playwright:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'pull_request' }}

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: expense
          POSTGRES_PASSWORD: expense
          POSTGRES_DB: expense_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U expense -d expense_app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      DATABASE_URL: postgresql://expense:expense@localhost:5432/expense_app_test?schema=public
      AUTH_SECRET: e2e-ci-auth-secret-not-for-production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply migrations and seed
        run: pnpm run db:setup

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm run test:e2e
