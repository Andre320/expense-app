name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: expense
          POSTGRES_PASSWORD: expense
          POSTGRES_DB: expense_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U expense -d expense_app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://expense:expense@localhost:5432/expense_app_test?schema=public
      AUTH_SECRET: ci-test-auth-secret-not-for-production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply migrations
        run: pnpm exec prisma migrate deploy

      - name: Integration tests
        run: pnpm test:integration

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Test coverage (lib)
        run: pnpm test:coverage
