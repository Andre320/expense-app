services:
  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: expense
      POSTGRES_PASSWORD: expense
      POSTGRES_DB: expense_app
    volumes:
      # PG 18+ official image: mount parent dir (not .../data)
      - expense_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense -d expense_app"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

volumes:
  expense_pg_data:
